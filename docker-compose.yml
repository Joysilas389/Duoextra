version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: duoextra-postgres
    environment:
      POSTGRES_DB: duoextra
      POSTGRES_USER: duoextra
      POSTGRES_PASSWORD: duoextra_dev_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U duoextra']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: duoextra-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: duoextra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: duoextra
      MINIO_ROOT_PASSWORD: duoextra_minio_pass
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duoextra-backend
    environment:
      DATABASE_URL: postgresql://duoextra:duoextra_dev_pass@postgres:5432/duoextra
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: duoextra
      S3_SECRET_KEY: duoextra_minio_pass
      S3_BUCKET: duoextra-media
      NODE_ENV: development
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duoextra-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  nginx:
    image: nginx:alpine
    container_name: duoextra-nginx
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
