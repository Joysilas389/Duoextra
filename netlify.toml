[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://duoextra-api.onrender.com/api"
  NEXT_PUBLIC_APP_NAME = "DuoExtra"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api/*"
  to = "https://duoextra-api.onrender.com/api/:splat"
  status = 200
  force = true
