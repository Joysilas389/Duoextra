services:
  - type: web
    name: duoextra-api
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: duoextra-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://duoextra.netlify.app
      - key: REDIS_URL
        fromService:
          name: duoextra-redis
          type: redis
          property: connectionString

databases:
  - name: duoextra-db
    plan: free
    databaseName: duoextra
    region: frankfurt
